  <script>
    
document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        blobUrls[uuid] = URL.createObjectURL(new Blob([finalBytes], { type: entry.mime }));
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        blobUrls[uuid] = URL.createObjectURL(new Blob([], { type: entry.mime }));
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).split('</' + 'script>').join('<\\/' + 'script>') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: fetch and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const r = await fetch(s.src);
        s.textContent = await r.text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

;color:var(--tx);text-decoration:none;display:flex;align-items:center;gap:.55rem;\">\n      <span aria-hidden=\"true\" style=\"width:7px;height:7px;border-radius:50%;background:var(--lime);box-shadow:0 0 10px var(--lime);flex-shrink:0;\"><\/span>\n      M. RADOVČIĆ\n    <\/a>\n    <div class=\"nm\" style=\"display:flex;align-items:center;gap:2rem;\">\n      <a href=\"#background\" style=\"font-size:.84rem;color:var(--mid);text-decoration:none;\">Background<\/a>\n      <a href=\"#work\" style=\"font-size:.84rem;color:var(--mid);text-decoration:none;\">Work<\/a>\n      <a href=\"#contact\" style=\"font-size:.84rem;color:var(--mid);text-decoration:none;\">Contact<\/a>\n    <\/div>\n    <div style=\"display:flex;gap:.65rem;align-items:center;\">\n      <a href=\"#contact\" style=\"font-size:.8rem;font-weight:500;padding:.48rem 1.25rem;background:var(--lime);color:#08090A;border-radius:100px;text-decoration:none;\">Get in touch<\/a>\n    <\/div>\n  <\/div>\n<\/nav>\n\n<main style=\"position:relative;z-index:2;\">\n\n<!-- HERO -->\n<header class=\"wp hero-pad\" style=\"max-width:1120px;margin:0 auto;padding:11rem 2.5rem 6rem;\">\n\n  <div data-reveal=\"\" class=\"badge\" style=\"--ad:0s;display:inline-flex;align-items:center;gap:.65rem;margin-bottom:2rem;font-size:.75rem;color:var(--mid);padding:.38rem .95rem;border:1px solid var(--ln);border-radius:100px;background:var(--su);letter-spacing:.02em;\">\n    <span aria-hidden=\"true\" style=\"width:6px;height:6px;border-radius:50%;background:var(--lime);flex-shrink:0;\"><\/span>\n    Production Coordinator · Pfizer / Hospira Zagreb · MSc Bioprocess Engineering\n  <\/div>\n\n  <h1 data-reveal=\"\" style=\"--ad:.12s;font-family:'Fraunces',serif;font-size:clamp(3rem,6.8vw,5.8rem);font-weight:400;line-height:1.02;letter-spacing:-.025em;max-width:22ch;margin-bottom:1.8rem;\">\n    Pharmaceutical operations<br>professional. <em style=\"font-style:italic;color:var(--lime);\">Now writing<br>the code<\/em> it needs.\n  <\/h1>\n\n  <p data-reveal=\"\" style=\"--ad:.24s;font-size:1.12rem;font-weight:300;color:var(--mid);max-width:580px;line-height:1.75;margin-bottom:2.4rem;\">\n    Ten years inside secondary packaging at Pfizer — managing GMP compliance, CAPA investigations, serialization rollouts, and production coordination. I also build the web applications pharmaceutical manufacturing is missing, because I know exactly what the problem feels like.\n  <\/p>\n\n  <div data-reveal=\"\" style=\"--ad:.34s;display:flex;gap:.75rem;flex-wrap:wrap;align-items:center;margin-bottom:4.5rem;\">\n    <a href=\"#contact\" style=\"display:inline-flex;align-items:center;gap:.45rem;padding:.88rem 1.75rem;background:var(--lime);color:#08090A;border-radius:100px;font-size:.9rem;font-weight:500;text-decoration:none;\">Get in touch →<\/a>\n    <a href=\"#work\" style=\"display:inline-flex;align-items:center;gap:.45rem;padding:.88rem 1.75rem;border:1px solid var(--ln);color:var(--tx);border-radius:100px;font-size:.9rem;text-decoration:none;\">See what I've built<\/a>\n\n  <\/div>\n\n  <div data-reveal=\"\" class=\"facts\" style=\"--ad:.46s;display:flex;flex-wrap:wrap;gap:2rem 4rem;padding-top:2.2rem;border-top:1px solid var(--ln-s);\">\n    <div>\n      <div style=\"font-family:'Fraunces',serif;font-size:2.1rem;font-weight:500;line-height:1;color:var(--tx);\">10+<\/div>\n      <div style=\"font-size:.78rem;color:var(--mid);margin-top:.3rem;font-weight:300;\">Years at Pfizer / Hospira<\/div>\n    <\/div>\n    <div>\n      <div style=\"font-family:'Fraunces',serif;font-size:2.1rem;font-weight:500;line-height:1;color:var(--tx);\">MSc<\/div>\n      <div style=\"font-size:.78rem;color:var(--mid);margin-top:.3rem;font-weight:300;\">Bioprocess Engineering<\/div>\n    <\/div>\n    <div>\n      <div style=\"font-family:'Fraunces',serif;font-size:2.1rem;font-weight:500;line-height:1;color:var(--tx);\">GMP<\/div>\n      <div style=\"font-size:.78rem;color:var(--mid);margin-top:.3rem;font-weight:300;\">CAPA · Serialization · PCT Lead<\/div>\n    <\/div>\n    <div>\n      <div style=\"font-family:'Fraunces',serif;font-size:2.1rem;font-weight:500;line-height:1;color:var(--lime);\">EU<\/div>\n      <div style=\"font-size:.78rem;color:var(--mid);margin-top:.3rem;font-weight:300;\">Zagreb · Remote-ready<\/div>\n    <\/div>\n  <\/div>\n\n<\/header>\n\n<!-- BACKGROUND -->\n<section id=\"background\" aria-labelledby=\"bg-h\" class=\"wp\" style=\"max-width:1120px;margin:0 auto;padding:7rem 2.5rem;\">\n\n  <div data-reveal=\"\" style=\"--ad:0s;\">\n    <span style=\"font-family:'Geist Mono',monospace;font-size:.7rem;letter-spacing:.12em;text-transform:uppercase;color:var(--lime-d);\">01 — Background<\/span>\n  <\/div>\n  <h2 data-reveal=\"\" style=\"--ad:.1s;font-family:'Fraunces',serif;font-size:clamp(2rem,3.8vw,3rem);font-weight:400;letter-spacing:-.02em;line-height:1.1;margin:1rem 0 1.5rem;\" id=\"bg-h\">Where the experience comes from.<\/h2>\n  <p data-reveal=\"\" style=\"--ad:.18s;font-size:1.02rem;font-weight:300;color:var(--mid);max-width:660px;line-height:1.78;margin-bottom:3.5rem;\">\n    I joined Hospira Zagreb — now Pfizer — in 2015 as a Process Engineer in secondary packaging, manufacturing parenterals, vials, and cytostatics under cGMP. Over the decade that followed I grew into Production Coordinator, served as PCT Lead (Process Centric Team) for the secondary packaging department, managed CAPA investigations for medical device combination products, and stepped in as acting department manager. In 2023 I started building software — for the problems I face on the floor every day.\n  <\/p>\n\n  <div class=\"tg\" data-reveal=\"\" style=\"--ad:.26s;display:grid;grid-template-columns:repeat(3,1fr);gap:1px;background:var(--ln);border:1px solid var(--ln);border-radius:18px;overflow:hidden;margin-bottom:3rem;\">\n    <div style=\"padding:1.8rem;background:var(--bg);\">\n      <div style=\"font-family:'Geist Mono',monospace;font-size:.68rem;color:var(--lime-d);letter-spacing:.08em;text-transfor
